<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Тест: отношения с едой</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Onest:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F4EF;
    --surface: #FFFFFF;
    --text: #1A1917;
    --text-2: #6B6860;
    --text-3: #A8A49E;
    --border: rgba(26,25,23,0.1);
    --border-2: rgba(26,25,23,0.18);
    --accent: #2D4A3E;
    --accent-light: #E8F0EC;
    --warn: #7A3B1E;
    --warn-light: #F5EAE4;
    --danger: #8B1A1A;
    --danger-light: #F5E4E4;
    --radius: 16px;
    --radius-sm: 10px;
  }

  body {
    font-family: 'Onest', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 60px;
  }

  .screen { display: none; width: 100%; max-width: 480px; padding: 0 20px; }
  .screen.active { display: flex; flex-direction: column; }



  .intro-eyebrow { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .tg-link { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); text-decoration: none; border: 0.5px solid var(--accent); padding: 3px 10px; border-radius: 20px; transition: background 0.15s; }
  .tg-link:hover { background: var(--accent-light); }
  .tg-link svg { flex-shrink: 0; }

  .photo-wrap { position: relative; width: calc(100% + 40px); margin: 0 -20px; aspect-ratio: 3/4; overflow: hidden; }
  .intro-photo { width: 100%; height: 100%; object-fit: cover; object-position: center 15%; display: block; }
  .photo-overlay { position: absolute; bottom: 14px; left: 20px; }
  .step-badge { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; background: rgba(255,255,255,0.92); color: var(--accent); padding: 5px 12px; border-radius: 20px; border: 0.5px solid var(--accent); font-weight: 500; }
  .intro-content { padding-top: 24px; }
  #screen-intro { padding-top: 0; gap: 0; }

  /* INTRO */
  #screen-intro { padding-top: 52px; gap: 0; }
  .intro-eyebrow {
    font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-3); margin-bottom: 18px;
  }
  .intro-title {
    font-family: 'Instrument Serif', serif;
    font-size: 38px; line-height: 1.15; color: var(--text);
    margin-bottom: 20px;
  }
  .intro-title em { font-style: italic; }
  .intro-desc {
    font-size: 15px; line-height: 1.7; color: var(--text-2);
    margin-bottom: 32px;
  }
  .disclaimer {
    background: var(--surface); border: 0.5px solid var(--border-2);
    border-radius: var(--radius-sm); padding: 14px 16px;
    font-size: 13px; line-height: 1.65; color: var(--text-2);
    margin-bottom: 32px;
  }
  .disclaimer strong { color: var(--text); font-weight: 500; }

  /* QUESTION */
  #screen-question { padding-top: 40px; gap: 0; }
  .progress-wrap { margin-bottom: 28px; }
  .progress-top {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px;
  }
  .progress-label { font-size: 12px; color: var(--text-3); }
  .progress-count { font-size: 12px; color: var(--text-3); }
  .progress-bar {
    height: 3px; background: var(--border);
    border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--accent);
    border-radius: 2px; transition: width 0.4s ease;
  }
  .block-tag {
    display: inline-block; font-size: 11px; letter-spacing: 0.08em;
    text-transform: uppercase; padding: 4px 10px;
    border-radius: 20px; margin-bottom: 20px;
    border: 0.5px solid;
  }
  .question-text {
    font-family: 'Instrument Serif', serif;
    font-size: 26px; line-height: 1.35; color: var(--text);
    margin-bottom: 36px; min-height: 120px;
    transition: opacity 0.2s ease;
  }
  .btn-row { display: flex; flex-direction: column; gap: 10px; }
  .btn-answer {
    padding: 16px 20px; border-radius: var(--radius-sm);
    border: 0.5px solid var(--border-2); background: var(--surface);
    font-family: 'Onest', sans-serif; font-size: 15px; font-weight: 500;
    color: var(--text); cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    display: flex; align-items: center; gap: 12px; text-align: left;
  }
  .btn-answer:active { transform: scale(0.98); }
  .btn-answer:hover { background: var(--bg); border-color: var(--border-2); }
  .btn-answer.yes { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
  .btn-answer.no  { background: var(--bg); }
  .btn-icon { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
  .btn-answer.yes .btn-icon { background: var(--accent); }
  .btn-answer.no  .btn-icon { background: var(--border); }

  /* RESULT */
  #screen-result { padding-top: 48px; gap: 0; }
  .result-level {
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    margin-bottom: 12px;
  }
  .result-title {
    font-family: 'Instrument Serif', serif;
    font-size: 34px; line-height: 1.2; margin-bottom: 16px;
  }
  .result-subtitle {
    font-size: 15px; line-height: 1.7; color: var(--text-2);
    margin-bottom: 28px;
  }
  .patterns-wrap { margin-bottom: 24px; }
  .patterns-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-3); margin-bottom: 12px; }
  .pattern-tag {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; padding: 6px 12px; border-radius: 20px;
    border: 0.5px solid; margin: 0 6px 6px 0;
  }

  .steps-wrap { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .step-item { display: flex; gap: 14px; align-items: flex-start; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 14px 16px; }
  .step-dot { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; margin-top: 1px; }
  .step-item-body { flex: 1; }
  .step-item-title { font-size: 13px; font-weight: 500; margin: 0 0 4px; }
  .step-item-desc { font-size: 13px; line-height: 1.65; color: var(--color-text-secondary); margin: 0; }
  .s2 { background: #E1F5EE; color: #085041; }
  .s3 { background: #FAECE7; color: #712B13; }
  @media (prefers-color-scheme: dark) {
    .s2 { background: #085041; color: #9FE1CB; }
    .s3 { background: #712B13; color: #F5C4B3; }
  }

  .rec-card {
    background: var(--surface); border: 0.5px solid var(--border-2);
    border-radius: var(--radius); padding: 18px 20px; margin-bottom: 12px;
  }
  .rec-card h3 { font-size: 14px; font-weight: 500; margin-bottom: 8px; color: var(--text); }
  .rec-card p  { font-size: 13px; line-height: 1.65; color: var(--text-2); }
  .btn-primary {
    display: block; width: 100%; padding: 16px;
    background: var(--accent); color: #fff; border: none;
    border-radius: var(--radius-sm); font-family: 'Onest', sans-serif;
    font-size: 15px; font-weight: 500; cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    text-align: center; margin-top: 8px;
  }
  .btn-primary:active { transform: scale(0.98); opacity: 0.9; }
  .btn-secondary {
    display: block; width: 100%; padding: 14px;
    background: transparent; color: var(--text-2);
    border: 0.5px solid var(--border-2);
    border-radius: var(--radius-sm); font-family: 'Onest', sans-serif;
    font-size: 14px; cursor: pointer;
    transition: background 0.15s; text-align: center; margin-top: 8px;
  }
  .btn-secondary:hover { background: var(--bg); }

  /* block tag colors */
  .tag-purple { background: #EEEDFE; color: #3C3489; border-color: #AFA9EC; }
  .tag-teal   { background: #E1F5EE; color: #085041; border-color: #5DCAA5; }
  .tag-coral  { background: #FAECE7; color: #712B13; border-color: #F0997B; }
  .tag-pink   { background: #FBEAF0; color: #72243E; border-color: #ED93B1; }
  .tag-gray   { background: #F1EFE8; color: #444441; border-color: #B4B2A9; }

  .divider { height: 0.5px; background: var(--border); margin: 24px 0; }

  /* fade animation */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .screen.active { animation: fadeUp 0.35s ease; }
</style>
</head>

<script>
const BLOCKS = [

let current = 0;
let scores = {};
let patternCount = {};

function startTest() {
  show('screen-question');
  renderQuestion();
}

function renderQuestion() {
  const q = QUESTIONS[current];
  const block = BLOCKS[q.block];
  const pct = Math.round((current / QUESTIONS.length) * 100);

  document.getElementById('block-name').textContent = block.name;
  document.getElementById('q-count').textContent = `${current + 1} / ${QUESTIONS.length}`;
  document.getElementById('progress-fill').style.width = pct + '%';

  const tag = document.getElementById('block-tag');
  tag.textContent = block.name;
  tag.className = 'block-tag ' + block.tag;

  const qEl = document.getElementById('question-text');
  qEl.style.opacity = '0';
  setTimeout(() => {
    qEl.textContent = q.text;
    qEl.style.opacity = '1';
    qEl.style.transition = 'opacity 0.25s ease';
  }, 80);
}

function answer(yes) {
  const q = QUESTIONS[current];
  if (yes) {
    const pts = q.key ? 2 : 1;
    scores.total = (scores.total || 0) + pts;
    patternCount[q.pattern] = (patternCount[q.pattern] || 0) + 1;
  }
  current++;
  if (current >= QUESTIONS.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

  } else {
    level = 'Высокий риск';
    levelColor = '#8B1A1A';
    title = 'Паттерны выражены';
    subtitle = 'Результаты указывают на устойчивые паттерны. Ты не одна с этим — и это поддаётся работе.';
    step2 = 'Сначала — просто выдохни. То, что ты дошла до конца этого теста — уже важно. Канал <a href="https://t.me/eatnofear" style="color:var(--accent);text-decoration:none;font-weight:500">@eatnofear</a> можно читать без давления, в своём темпе.';
    step3 = 'Ты уже сделала важный шаг — увидела, что происходит. Следующий — поговорить со специалистом, который работает именно с РПП. Это меняет всё. Запись через Телеграм.';
  }

  const activePatterns = Object.entries(patternCount)
    .filter(([, v]) => v >= 2)
    .map(([k]) => k);

  const patternHTML = activePatterns.length
    ? '<div class="patterns-wrap"><p class="patterns-title">Выраженные паттерны</p>' +
      activePatterns.map(p => '<span class="pattern-tag ' + PATTERN_LABELS[p].tag + '">' + PATTERN_LABELS[p].label + '</span>').join('') +
      '</div>'
    : '';

  document.getElementById('screen-result').innerHTML =
    '<p class="result-level" style="color:' + levelColor + '">' + level + '</p>' +
    '<h2 class="result-title">' + title + '</h2>' +
    '<p class="result-subtitle">' + subtitle + '</p>' +
    patternHTML +
    '<div class="divider"></div>' +
    '<p class="steps-heading">Что с этим делать</p>' +
    '<div class="step-item">' +
      '<span class="step-dot sdot-teal">2</span>' +
      '<div class="step-item-body">' +
        '<p class="step-item-title">Разбери свой паттерн</p>' +
        '<p class="step-item-desc">' + step2 + '</p>' +
      '</div>' +
    '</div>' +
    '<div class="step-item">' +
      '<span class="step-dot sdot-coral">3</span>' +
      '<div class="step-item-body">' +
        '<p class="step-item-title">Поговори со специалистом</p>' +
        '<p class="step-item-desc">' + step3 + '</p>' +
      '</div>' +
    '</div>' +
    '<button class="btn-primary" onclick="window.open(&quot;https://t.me/mchhrz&quot;,&quot;_blank&quot;)">Записаться к специалисту &#8594;</button>' +
    '<button class="btn-secondary" onclick="restartTest()">Пройти тест заново</button>';

  show('screen-result');

  if (window.Telegram && window.Telegram.WebApp) {
    Telegram.WebApp.sendData(JSON.stringify({ score: total, level: level, patterns: activePatterns }));
  }
}

function onCTA() {
  window.open('https://t.me/mchhrz', '_blank');
}

function restartTest() {
  current = 0;
  scores = {};
  patternCount = {};
  show('screen-intro');
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
